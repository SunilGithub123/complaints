services:
  postgres:
    image: postgres:16-alpine
    container_name: complaints-postgres
    environment:
      POSTGRES_DB: complaints
      POSTGRES_USER: complaints
      POSTGRES_PASSWORD: complaints
      TZ: Asia/Kolkata
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U complaints -d complaints"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:

