# ArchUnit configuration.
# Strict mode: a rule that matches zero classes is treated as a test failure,
# guarding against package renames that silently disable a rule.
# (Was `false` during Phase 0 scaffold when per-module packages did not yet exist;
# flipped to `true` in Phase 1 Stage 2 once auth + masterdata modules landed.)
archRule.failOnEmptyShould=true
