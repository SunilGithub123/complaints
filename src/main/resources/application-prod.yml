spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5

  cache:
    type: caffeine
    caffeine:
      spec: maximumSize=50000,expireAfterWrite=10m

  cloud:
    gcp:
      project-id: ${GCP_PROJECT_ID}

app:
  storage:
    type: gcs
    gcs-bucket: ${GCS_BUCKET:complaints-images-prod}
  sms:
    provider: msg91
    msg91-key: ${MSG91_KEY}
    msg91-template-id: ${MSG91_TEMPLATE_ID}
  notification:
    push: fcm
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS}
  swagger:
    secured: true
    basic-user: ${SWAGGER_BASIC_USER}
    basic-password: ${SWAGGER_BASIC_PASSWORD}

logging:
  level:
    root: WARN
    com.example.complaints: INFO

