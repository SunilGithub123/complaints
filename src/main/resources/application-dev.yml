spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/complaints
    username: complaints
    password: complaints

  flyway:
    locations: classpath:db/migration,classpath:db/migration-dev
    # Dev-only: V1000.x seed migrations are applied before each new V1.x lands on disk,
    # so any later V1.x is "out of order" relative to V1000.x. Strict ordering is enforced
    # in test/prod profiles; dev is allowed to backfill. Never enable this in prod.
    out-of-order: true

  cache:
    type: caffeine
    caffeine:
      spec: maximumSize=10000,expireAfterWrite=10m

app:
  storage:
    type: local
    local-path: ./uploads
  sms:
    provider: console
  notification:
    push: mock
  cors:
    allowed-origins: "http://localhost:*"
  swagger:
    secured: false                        # Swagger UI is open in dev

logging:
  level:
    com.example.complaints: DEBUG
    org.hibernate.SQL: DEBUG

